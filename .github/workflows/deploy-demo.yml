name: Deploy demo

# Builds the example site against Overture's live STAC catalog and publishes it
# to GitHub Pages on every push to main. Overture's underlying Parquet
# partitions hold hundreds of millions of rows per theme/type (e.g. the global
# `transportation/connector` partition alone), so the per-collection Item cap
# (STAC_MAX_ITEMS) keeps the build bounded; items past the cap remain
# browsable via client-side lazy loading rather than being statically
# rendered. Docusaurus's `onBrokenLinks: 'warn'` setting in the example site
# is intentional: pagination/breadcrumb links that reference items beyond the
# cap are expected to warn (not error) here, so those warnings in the build
# log are benign and don't fail the job. The basemap is drawn from Overture's
# hosted PMTiles, read directly in the browser via range requests (no tile
# server).

on:
  push:
    branches: [main]
  workflow_dispatch:

# No permissions by default; each job requests exactly what it needs.
permissions: {}

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build demo site
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout the source
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - uses: lowlydba/sustainable-npm@31d51025884f424f58f22e4e6578178bb4e79632 # v3.0.0

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Build demo site (Overture STAC catalog + PMTiles basemap)
        working-directory: example
        env:
          STAC_CATALOG_URL: https://stac.overturemaps.org/catalog.json
          STAC_MAX_ITEMS: '5000'
          STAC_PMTILES_URL: https://overturemaps-extras-us-west-2.s3.us-west-2.amazonaws.com/tiles/2026-05-20.0/base.pmtiles
          DOCS_URL: https://lowlydba.github.io
          DOCS_BASE_URL: /docusaurus-plugin-stac/
        run: |
          echo "::notice title=Expected broken-link warnings::Items beyond STAC_MAX_ITEMS ($STAC_MAX_ITEMS per collection) are lazy-loaded, not statically rendered. Any 'Broken link' warnings below referencing them are expected (onBrokenLinks: 'warn') and do not fail this job."
          npx docusaurus build

      # Replicates actions/upload-pages-artifact's archive step, minus its
      # hard-coded `-v`: that verbose flag logs every single file in the
      # tarball, which is thousands of lines for a demo build this size
      # (5000-item Overture crawl → thousands of statically rendered pages).
      - name: Archive artifact for Pages
        run: |
          echo ::group::Archive artifact
          tar \
            --dereference --hard-dereference \
            --directory example/build \
            -cf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=.[^/]* \
            .
          echo ::endgroup::

      - name: Upload Pages artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-slim
    permissions:
      pages: write # deploy to the Pages site
      id-token: write # mint the OIDC token deploy-pages verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
