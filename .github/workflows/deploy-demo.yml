name: Deploy demo

# Builds the example site against Overture's live STAC catalog and publishes it
# to GitHub Pages on every push to main. The per-collection Item cap keeps the
# build bounded (Overture collections hold hundreds of items each).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build demo site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Build demo site (Overture STAC catalog)
        working-directory: example
        env:
          STAC_CATALOG_URL: https://labs.overturemaps.org/stac/catalog.json
          STAC_MAX_ITEMS: '10'
          DOCS_URL: https://lowlydba.github.io
          DOCS_BASE_URL: /docusaurus-plugin-stac/
        run: npx docusaurus build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: example/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
