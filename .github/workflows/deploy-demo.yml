name: Deploy demo

# Builds the example site against Overture's live STAC catalog and publishes it
# to GitHub Pages on every push to main. The per-collection Item cap keeps the
# build bounded (Overture collections hold hundreds of items each); items past
# the cap remain browsable via client-side lazy loading. The basemap is drawn
# from Overture's hosted PMTiles, read directly in the browser via range
# requests (no tile server).

on:
  push:
    branches: [main]
  workflow_dispatch:

# No permissions by default; each job requests exactly what it needs.
permissions: {}

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build demo site
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout the source
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - uses: lowlydba/sustainable-npm@31d51025884f424f58f22e4e6578178bb4e79632 # v3.0.0

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Build demo site (Overture STAC catalog + PMTiles basemap)
        working-directory: example
        env:
          STAC_CATALOG_URL: https://labs.overturemaps.org/stac/catalog.json
          STAC_MAX_ITEMS: '10'
          STAC_PMTILES_URL: https://overturemaps-extras-us-west-2.s3.us-west-2.amazonaws.com/tiles/2026-05-20.0/base.pmtiles
          DOCS_URL: https://lowlydba.github.io
          DOCS_BASE_URL: /docusaurus-plugin-stac/
        run: npx docusaurus build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: example/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy to the Pages site
      id-token: write # mint the OIDC token deploy-pages verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
