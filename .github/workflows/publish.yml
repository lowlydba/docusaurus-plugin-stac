name: Publish

# Publishes the package to GitHub Packages (npm registry) when a GitHub Release
# is published, or on manual dispatch. The package is scoped to the repository
# owner (@lowlydba) as required by GitHub Packages.
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the package to GitHub Packages
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@lowlydba'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      # `prepublishOnly` re-runs clean+build; publish only the root package
      # (the example workspace is private and is skipped automatically).
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
